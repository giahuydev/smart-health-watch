<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="50%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Top Band -->
  <path d="M190,50 L310,50 C310,50 310,120 310,160 C310,180 190,180 190,160 C190,120 190,50 190,50 Z" fill="url(#bandGrad)" />
  
  <!-- Bottom Band -->
  <path d="M190,450 L310,450 C310,450 310,380 310,340 C310,320 190,320 190,340 C190,380 190,450 190,450 Z" fill="url(#bandGrad)" />

  <!-- Watch Body (Case) -->
  <rect x="150" y="140" width="200" height="220" rx="40" ry="40" fill="url(#bodyGrad)" stroke="#64748b" stroke-width="2" />

  <!-- Crown (Button) -->
  <rect x="345" y="210" width="10" height="30" rx="3" ry="3" fill="#94a3b8" />
  <rect x="348" y="260" width="5" height="15" rx="2" ry="2" fill="#64748b" />

  <!-- Watch Screen -->
  <rect x="165" y="155" width="170" height="190" rx="25" ry="25" fill="url(#screenGrad)" />

  <!-- Screen Content: Heart Rate -->
  <path d="M 180,250 L 210,250 L 220,230 L 240,280 L 255,210 L 275,270 L 285,250 L 320,250" fill="none" stroke="#f43f5e" stroke-width="4" stroke-linejoin="round" />
  
  <text x="210" y="210" font-family="sans-serif" font-size="48" font-weight="bold" fill="#ffffff">72</text>
  <text x="270" y="208" font-family="sans-serif" font-size="16" fill="#f43f5e">BPM</text>
  
  <!-- Heart Icon -->
  <path d="M285,185 C285,180 280,175 275,175 C270,175 265,180 265,185 C265,195 285,210 285,210 C285,210 305,195 305,185 C305,180 300,175 295,175 C290,175 285,180 285,185 Z" fill="#f43f5e" filter="url(#glow)"/>
</svg>
